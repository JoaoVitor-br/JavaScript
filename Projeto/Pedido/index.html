<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido</title>
    <style>
        body{
            background: linear-gradient(rgb(223, 24, 57),rgb(226, 131, 131));
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }
        button{
            background-color: black;
            color : white;
            font-size: 40px;
            border-radius: 15px;
            padding: 15px 30px;
            width: 230px;
            border:none;
            text-align: center;
        }
        h1 {
            color: white;
            font-size: 90px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        .botoes{
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>Você jogaria silksong ?</h1>
    <div class="botoes">
        <div class="botaoS">
            <button onclick="sim()">ACEITAS</button>
        </div>
        <div class="botaoN">
            <button onclick="desvia()"onmouseover="desvia()" id="botao">NEGASTE</button>
        </div>
    </div>


    <script>
        function sim() {
            location.href = "https://www.youtube.com/watch?v=PgUssv-fV7w"
        }
        function desvia(){
            let botao = document.getElementById("botao")
            botao.style.position = "Absolute"
            botao.style.bottom = gerarPosicao(10,80)
            botao.style.left = gerarPosicao(10,80)
        }
        function gerarPosicao(min,max){
            return (Math.random()*(max-min)+min)+"%"
        }

    </script>
</body>
</html>
